<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DM Tool (SRD Powered)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>DM Tool (SRD Powered)</header>

<div class="tabs">
    <button onclick="showTab('gen')">Generator</button>
    <button onclick="showTab('sheet')">Sheet</button>
    <button onclick="showTab('spells')">Spells</button>
    <button onclick="showTab('rules')">Rules</button>
</div>

<div id="gen" class="tab active">
    <div class="card">
        <label>Name</label>
        <input id="name" placeholder="Hero Name">

        <label>Class</label>
        <select id="class"></select>

        <label>Subclass</label>
        <select id="subclass"></select>

        <label>Level</label>
        <input id="level" type="number" value="1" min="1" max="20">

        <button class="primary-btn" onclick="generateCharacter()">Generate</button>
    </div>
</div>

<div id="sheet" class="tab">
    <div id="sheetOutput"></div> </div>

<div id="spells" class="tab">
    <label>Search Spells</label>
    <input id="spellSearch" placeholder="Filter spells...">
    <div id="spellList"></div>
</div>

<div id="rules" class="tab">
    <label>Search Rules</label>
    <input id="ruleSearch" placeholder="Filter conditions...">
    <div id="ruleList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
