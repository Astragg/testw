<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Professional Loot Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vault of the Ancients</h1>
            <p>Precise D&D 5e Loot Scaling</p>
        </header>

        <section class="generator-form">
            <div class="input-grid">
                <div class="form-group">
                    <label>Party Level (1-20)</label>
                    <input type="number" id="partyLevel" min="1" max="20" value="1">
                </div>
                <div class="form-group">
                    <label>Party Size</label>
                    <input type="number" id="partySize" min="1" max="8" value="4">
                </div>
                <div class="form-group">
                    <label>Number of Enemies</label>
                    <input type="number" id="enemyCount" min="1" max="50" value="1">
                </div>
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="difficulty">
                        <option value="0.5">Easy</option>
                        <option value="1" selected>Medium</option>
                        <option value="1.5">Hard</option>
                        <option value="2.5">Deadly</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Loot Scale</label>
                    <select id="lootScale">
                        <option value="individual">Individual (On Bodies)</option>
                        <option value="hoard">Treasure Hoard (The Big Chest)</option>
                    </select>
                </div>
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="includeCoins" checked> Coins</label>
                <label><input type="checkbox" id="includeMundane" checked> Mundane</label>
                <label><input type="checkbox" id="includeGems" checked> Gems/Art</label>
                <label><input type="checkbox" id="includeMagic" checked> Magic Items</label>
            </div>

            <button id="generateBtn">Roll for Loot</button>
        </section>

        <hr class="divider">

        <section id="lootResult" class="loot-display hidden">
            </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
