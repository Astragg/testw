<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>D&D Character Generator</h2>

<label>Name</label>
<input id="name">

<label>Class</label>
<select id="class"></select>

<label>Level</label>
<input id="level" type="number" value="1" min="1" max="20">

<button onclick="generateCharacter()">Generate</button>

<h3>Character</h3>
<div id="sheet"></div>

<h3>Spell Search</h3>
<input id="spellSearch" placeholder="Search spells...">
<div id="spellList"></div>

<script src="script.js"></script>
</body>
</html>
