<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruitPro | Elite Scouting</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="nav-bar">
        <div class="container nav-wrap">
            <div class="brand">PLAYER<span>PRO</span></div>
            <div class="controls">
                <input type="text" id="search" placeholder="Search name/rank..." onkeyup="filter()">
                <div id="authPanel"></div>
                <button class="btn-add" id="addBtn" style="display:none" onclick="openEditor()">+ Add Profile</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="grid" class="player-grid"></div>
    </main>

    <!-- PLAYER EDITOR MODAL -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Player Editor</h2>
                <span class="close" onclick="closeModal('editorModal')">&times;</span>
            </header>
            <form id="playerForm">
                <input type="hidden" id="pid">
                
                <div class="section-label">General Info</div>
                <div class="row"><input id="name" placeholder="Full Name" required><input id="pos" placeholder="Position"></div>
                <div class="row"><input id="year" placeholder="Class Year"><input id="num" placeholder="Jersey #"></div>
                <div class="row"><input id="h" placeholder="Height"><input id="w" placeholder="Weight"><input type="number" id="age" placeholder="Age"></div>
                
                <div class="section-label">Season Averages</div>
                <div class="row">
                    <input id="avg_pts" placeholder="PTS">
                    <input id="avg_ast" placeholder="AST">
                    <input id="avg_reb" placeholder="REB">
                    <input id="avg_time" placeholder="Time/Score">
                </div>

                <div class="section-label">Last Game Result</div>
                <div class="row">
                    <input id="last_opp" placeholder="Opponent">
                    <input id="last_score" placeholder="Game Score">
                    <input id="last_pts" placeholder="Player Stats/Time">
                </div>

                <div class="section-label">Skill Set</div>
                <div id="skillsContainer"></div>
                <button type="button" class="btn-text" onclick="addSkillRow()">+ Add Skill</button>

                <div class="section-label">Ranking & Media</div>
                <input id="rank" placeholder="State/Global Rank (e.g. #2 UT - 2027)">
                <input id="arch" placeholder="Archetype (e.g. Glue Player)">
                <input id="vid" placeholder="Video Link (YouTube/Veo)">

                <button type="submit" class="btn-submit">Publish Profile</button>
            </form>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content mini">
            <h2 id="atitle">Login</h2>
            <input type="email" id="aemail" placeholder="Email">
            <input type="password" id="apass" placeholder="Password">
            <button class="btn-submit" onclick="handleAuth()">Continue</button>
            <p id="aswitch" onclick="swapAuth()" style="text-align:center; cursor:pointer; font-size:0.8rem; margin-top:15px;">Need an account? Sign Up</p>
        </div>
    </div>

    <!-- Forces refresh of cached script -->
    <script src="script.js?v=1.5"></script>
</body>
</html>
