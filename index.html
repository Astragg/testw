<header>
    <div class="container header-flex">
        <div class="logo">PLAYER <span>PRO</span></div>
        <div class="auth-controls">
            <div id="authStatus">
                <button class="btn-secondary" onclick="showAuthModal()">Login / Sign Up</button>
            </div>
            <button class="btn-add" id="addBtn" style="display:none;" onclick="openModal()">+ Add Profile</button>
        </div>
    </div>
</header>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="authTitle">Login</h2>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPass" placeholder="Password">
        <button onclick="handleAuth()" class="btn-submit">Continue</button>
        <p onclick="toggleAuthMode()" id="authToggle" style="cursor:pointer; font-size: 0.8rem; text-align: center;">Need an account? Sign Up</p>
    </div>
</div>

<!-- Updated Player Form (Inside the existing playerModal) -->
<div class="form-row">
    <input type="text" id="video_url" placeholder="Highlights URL (YouTube/Veo)">
</div>

<label>Skill Set</label>
<div id="skillsContainer">
    <div class="skill-input-row">
        <select class="skill-name">
            <option value="Shooting">Shooting</option>
            <option value="Passing">Passing</option>
            <option value="Rebounding">Rebounding</option>
            <option value="Dunking">Dunking</option>
            <option value="Defense">Defense</option>
            <option value="Mechanics">Mechanics</option>
            <option value="Driving">Driving</option>
        </select>
        <select class="skill-level">
            <option value="Elite">Elite</option>
            <option value="Great">Great</option>
            <option value="Situational">Situational</option>
            <option value="Developing">Developing</option>
        </select>
    </div>
</div>
<button type="button" onclick="addSkillRow()" style="background:none; border:none; color:green; cursor:pointer;">+ Add Another Skill</button>
