<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Character Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>Emergency Character Generator</header>

<div class="tabs">
  <button onclick="showTab('gen')">Generator</button>
  <button onclick="showTab('sheet')">Sheet</button>
  <button onclick="showTab('spells')">Spells</button>
  <button onclick="showTab('rules')">Rules</button>
</div>

<!-- GENERATOR -->
<div id="gen" class="tab active">
  <input id="name" placeholder="Name">
  <select id="race"></select>
  <select id="class"></select>
  <input id="level" type="number" min="1" max="20" value="1">
  <button onclick="generateCharacter()">Generate</button>
</div>

<!-- SHEET -->
<div id="sheet" class="tab">
  <div id="sheetView"></div>
</div>

<!-- SPELLS -->
<div id="spells" class="tab">
  <input id="spellSearch" placeholder="Search spells...">
  <div id="spellList"></div>
</div>

<!-- RULES -->
<div id="rules" class="tab">
  <input id="ruleSearch" placeholder="Search rules...">
  <div id="ruleList"></div>
</div>

<script src="data/races.js"></script>
<script src="data/classes.js"></script>
<script src="data/spells.js"></script>
<script src="data/rules.js"></script>
<script src="data/items.js"></script>
<script src="script.js"></script>

</body>
</html>
