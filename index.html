<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruitScout | Player Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="scout-header">
        <div class="container header-wrap">
            <div class="brand">PLAYER<span>PRO</span></div>
            <div class="actions">
                <input type="text" id="search" placeholder="Filter by name/rank..." onkeyup="filter()">
                <div id="authPanel">
                    <button class="btn-outline" onclick="toggleModal('authModal')">Login / Sign Up</button>
                </div>
                <button class="btn-add" id="addBtn" style="display:none" onclick="openEditor()">+ Create Profile</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="grid" class="player-grid"></div>
    </main>

    <!-- PLAYER EDITOR MODAL -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Recruit Profile Editor</h2>
                <span class="close" onclick="toggleModal('editorModal')">&times;</span>
            </div>
            <form id="playerForm">
                <input type="hidden" id="pid">
                
                <div class="form-section">
                    <label>General Info</label>
                    <div class="row"><input id="name" placeholder="Full Name" required><input id="pos" placeholder="Position"></div>
                    <div class="row"><input id="year" placeholder="Class Year"><input id="num" placeholder="Jersey #"></div>
                    <div class="row"><input id="h" placeholder="Height"><input id="w" placeholder="Weight"><input type="number" id="age" placeholder="Age"></div>
                </div>

                <div class="form-section">
                    <label>Season Averages</label>
                    <div class="row">
                        <input id="avg_pts" placeholder="PTS">
                        <input id="avg_ast" placeholder="AST">
                        <input id="avg_reb" placeholder="REB">
                        <input id="avg_time" placeholder="Time/Score">
                    </div>
                </div>

                <div class="form-section">
                    <label>Last Game Result</label>
                    <div class="row">
                        <input id="last_opp" placeholder="Opponent">
                        <input id="last_score" placeholder="Game Score (e.g. 82-78)">
                        <input id="last_pts" placeholder="Player Pts/Time">
                    </div>
                </div>

                <div class="form-section">
                    <label>Skill Set</label>
                    <div id="skillsEntry">
                        <div class="skill-row">
                            <select class="s-name">
                                <option>Shooting</option><option>Passing</option><option>Defense</option>
                                <option>Mechanics</option><option>Dunking</option><option>Rebounding</option>
                            </select>
                            <select class="s-lvl"><option>ELITE</option><option>GREAT</option><option>SITUATIONAL</option></select>
                        </div>
                    </div>
                    <button type="button" class="btn-text" onclick="addSkillRow()">+ Add Skill</button>
                </div>

                <input id="rank" placeholder="State Rank"><input id="arch" placeholder="Archetype"><input id="vid" placeholder="Video Link">
                <button type="submit" class="btn-save">Publish Profile</button>
            </form>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content mini">
            <h2 id="atitle">Login</h2>
            <input type="email" id="aemail" placeholder="Email">
            <input type="password" id="apass" placeholder="Password">
            <button class="btn-save" onclick="handleAuth()">Continue</button>
            <p onclick="swapAuth()" id="aswitch" style="cursor:pointer; font-size: 0.8rem; text-align:center;">Need an account? Sign Up</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
