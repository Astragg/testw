<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Tool - SRD Powered</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>DM Tool (SRD Powered)</h1>
</header>

<nav class="tabs">
    <button class="tab-btn" onclick="showTab('gen')">Generator</button>
    <button class="tab-btn" onclick="showTab('sheet')">Sheet</button>
    <button class="tab-btn" onclick="showTab('spells')">Spells</button>
    <button class="tab-btn" onclick="showTab('rules')">Rules</button>
</nav>

<main>
    <div id="gen" class="tab active">
        <div class="card">
            <label>Character Name</label>
            <input id="name" placeholder="Hero Name">

            <label>Class</label>
            <select id="class"></select>

            <label>Subclass</label>
            <select id="subclass">
                <option>Select a class first</option>
            </select>

            <label>Level</label>
            <input id="level" type="number" value="1" min="1" max="20">

            <div class="stat-roll-box">
                <button onclick="rerollStats()">Roll New Stats</button>
                <div id="statPreview"></div>
            </div>

            <button class="primary-btn" onclick="generateCharacter()">Generate Character</button>
        </div>
    </div>

    <div id="sheet" class="tab">
        <div id="sheetOutput">
            <p>No character generated yet.</p>
        </div>
    </div>

    <div id="spells" class="tab">
        <label>Search Spells</label>
        <input id="spellSearch" placeholder="Fireball...">
        <div class="split-view">
            <div id="spellList" class="scroll-list"></div>
            <div id="spellDetails" class="detail-card">Select a spell to view details</div>
        </div>
    </div>

    <div id="rules" class="tab">
        <label>Search Conditions</label>
        <input id="ruleSearch" placeholder="Blinded...">
        <div id="ruleList" class="grid-list"></div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
