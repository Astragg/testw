<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexScout | Elite Prospect Database</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="container nav-flex">
            <div class="brand">APEX<span>SCOUT</span></div>
            <div class="nav-right">
                <input type="text" id="search" placeholder="Search athletes..." onkeyup="filter()">
                <div id="authArea"></div>
                <button class="btn-create" id="addBtn" style="display:none" onclick="openEditor()">+ Create Profile</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="grid" class="profile-grid"></div>
    </main>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-card mini">
            <h2 id="aTitle">Sign In</h2>
            <div class="input-stack">
                <input type="email" id="aEmail" placeholder="Email Address">
                <input type="password" id="aPass" placeholder="Password">
            </div>
            <button class="btn-primary" onclick="handleAuth()">Continue</button>
            <p id="aToggle" onclick="swapAuth()">Need an account? Sign Up</p>
            <button class="btn-close" onclick="closeModal('authModal')">Cancel</button>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="playerModal" class="modal">
        <div class="modal-card">
            <header class="modal-header">
                <h3>Athlete Profile Editor</h3>
                <span class="close-icon" onclick="closeModal('playerModal')">&times;</span>
            </header>
            <form id="playerForm">
                <input type="hidden" id="pid">
                
                <div class="form-grid">
                    <div class="span-2"><label>Full Name</label><input id="name" required></div>
                    <div><label>Position</label><input id="pos" placeholder="e.g. SG"></div>
                    <div><label>Class Year</label><input id="year" placeholder="e.g. 2027"></div>
                    <div><label>Jersey #</label><input id="num"></div>
                    <div><label>Height</label><input id="h" placeholder="e.g. 6'4"></div>
                    <div><label>Weight (LB)</label><input id="w" type="number"></div>
                    <div><label>Age</label><input id="age" type="number"></div>
                    <div class="span-2"><label>Location</label><input id="loc" placeholder="City, State"></div>
                </div>

                <div class="stat-section">
                    <label>Season Averages (Numbers Only)</label>
                    <div class="stat-inputs">
                        <input id="avg_pts" placeholder="PTS">
                        <input id="avg_ast" placeholder="AST">
                        <input id="avg_reb" placeholder="REB">
                        <input id="avg_time" placeholder="Score/Time">
                    </div>
                </div>

                <div class="skill-section">
                    <label>Skill Ratings</label>
                    <div id="skillsList"></div>
                    <button type="button" class="btn-add-skill" onclick="addSkillRow()">+ Add Skill</button>
                </div>

                <div class="form-grid">
                    <div><label>Rank</label><input id="rank"></div>
                    <div><label>Archetype</label><input id="arch"></div>
                    <div class="span-2"><label>Highlight Link</label><input id="vid"></div>
                </div>

                <button type="submit" class="btn-primary">Publish to ApexScout</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
